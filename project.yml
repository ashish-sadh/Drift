name: Drift
options:
  bundleIdPrefix: com.drift
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

schemes:
  Drift:
    build:
      targets:
        Drift: all
        DriftTests: [test]
    test:
      targets:
        - DriftTests
  DriftLLMEvalMacOS:
    build:
      targets:
        DriftLLMEvalMacOS: all
    test:
      targets:
        - DriftLLMEvalMacOS
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  DriftCore:
    path: DriftCore

targets:
  Drift:
    type: application
    platform: iOS
    sources:
      - path: Drift
    resources:
      - path: Drift/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drift.health
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 251
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Drift/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Drift
        CODE_SIGN_ENTITLEMENTS: Drift/Drift.entitlements
        DEVELOPMENT_TEAM: ZJ5H5XH82A
    dependencies:
      - package: GRDB
      - package: DriftCore
      - framework: Frameworks/llama.xcframework
        embed: true
      - target: DriftWidget
        embed: true

    entitlements:
      path: Drift/Drift.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.kernel.increased-memory-limit: true
        com.apple.security.application-groups:
          - group.com.drift.health
        # iCloud Drive container entitlements are commented out because the
        # App ID com.drift.health doesn't have iCloud capability enabled in
        # the Apple Developer portal yet, and the container itself doesn't
        # exist. Adding these keys to the entitlements without portal-side
        # provisioning makes `xcodebuild archive` fail with: "Provisioning
        # profile … doesn't include the iCloud capability".
        #
        # To unblock:
        #   1. Xcode → Drift target → Signing & Capabilities → + Capability
        #      → iCloud → check "iCloud Documents" → + container →
        #      create `iCloud.com.drift.health`.
        #   2. Re-add the three keys below.
        #   3. xcodegen generate && archive.
        #
        # Until then, BackupSettingsView's `containerURL()` returns nil and
        # the user sees "iCloud Drive is off" — known limitation.
        #
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.com.drift.health
        # com.apple.developer.icloud-services:
        #   - CloudDocuments
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.com.drift.health

  DriftWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DriftWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drift.health.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 251
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: DriftWidget/Info.plist
        DEVELOPMENT_TEAM: ZJ5H5XH82A
        CODE_SIGN_ENTITLEMENTS: DriftWidget/DriftWidget.entitlements
    entitlements:
      path: DriftWidget/DriftWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.drift.health

  DriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DriftTests
        excludes:
          - "LLMEval"
    dependencies:
      - target: Drift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  DriftLLMEvalMacOS:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DriftLLMEvalMacOS
    dependencies:
      - framework: Frameworks/llama.xcframework
      - package: DriftCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
