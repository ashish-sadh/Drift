<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report — Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Report card */
    .report-rendered {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Sections */
    .report-section {
      position: relative;
      padding: 16px 20px;
      border-radius: 8px;
      transition: background 0.15s;
      margin: 4px -20px;
    }
    .report-section:hover {
      background: rgba(88, 166, 255, 0.04);
    }
    .report-section:hover .comment-btn {
      opacity: 1;
    }
    .report-section.has-comments {
      background: rgba(88, 166, 255, 0.03);
      border-left: 3px solid var(--accent);
      margin-left: -23px;
    }

    /* Comment button */
    .comment-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      opacity: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .comment-btn:hover { background: var(--accent-hover); transform: scale(1.1); }

    /* Typography */
    .report-rendered h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: -0.5px;
    }
    .report-rendered h1 + p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .report-rendered h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 14px;
    }
    .report-rendered h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 24px 0 10px;
      color: var(--text);
    }
    .report-rendered p {
      margin: 10px 0;
      line-height: 1.75;
      color: var(--text);
    }
    .report-rendered ul, .report-rendered ol {
      margin: 10px 0;
      padding-left: 24px;
    }
    .report-rendered li {
      margin: 6px 0;
      line-height: 1.7;
    }
    .report-rendered li strong {
      color: var(--accent);
    }

    /* Tables */
    .report-rendered table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 20px 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .report-rendered th {
      background: var(--bg);
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .report-rendered td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
    }
    .report-rendered tr:last-child td { border-bottom: none; }
    .report-rendered tr:hover td { background: rgba(88, 166, 255, 0.03); }
    .report-rendered th + th, .report-rendered td + td {
      border-left: 1px solid rgba(48, 54, 61, 0.5);
    }

    /* Code */
    .report-rendered code {
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .report-rendered pre {
      background: var(--bg);
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
      border: 1px solid var(--border);
    }
    .report-rendered pre code { padding: 0; background: none; }

    /* Blockquotes */
    .report-rendered blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 16px 0;
      color: var(--text-muted);
      background: rgba(88, 166, 255, 0.03);
      border-radius: 0 8px 8px 0;
    }

    .report-rendered strong { color: #e6edf3; }
    .report-rendered hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .report-rendered a { color: var(--accent); }
    .report-rendered a:hover { text-decoration: underline; }

    /* Status badges in content */
    .report-rendered del { color: var(--green); text-decoration: line-through; opacity: 0.7; }
    .report-rendered em { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
    <div id="auth-area"></div>
  </div>

  <div class="content">
    <div class="report-header">
      <a href="index.html#reports" class="back-link">&larr; Back to Reports</a>
      <div id="pr-link"></div>
    </div>

    <div id="report-body" class="loading"><span class="spinner"></span> Loading report...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const filename = params.get('file');
    let currentPR = null;
    let currentPath = `Docs/reports/${filename}`;
    let commentsBySection = {};
    let rawLines = [];

    async function loadReport() {
      if (!filename) {
        document.getElementById('report-body').innerHTML = '<div class="empty">No report specified.</div>';
        return;
      }

      try {
        const content = await getReportContent(currentPath);
        rawLines = content.split('\n');

        // Find associated PR
        currentPR = await findPRForReport(filename);
        if (currentPR) {
          document.getElementById('pr-link').innerHTML =
            `<a href="${currentPR.html_url}" target="_blank" class="btn">View on GitHub #${currentPR.number}</a>`;

          // Load existing comments and map to sections
          const comments = await getPRComments(currentPR.number);
          comments.forEach(c => {
            const line = c.fileLine;
            if (line) {
              // Map line to section index
              const sectionIdx = lineToSection(line);
              if (!commentsBySection[sectionIdx]) commentsBySection[sectionIdx] = [];
              commentsBySection[sectionIdx].push(c);
            }
          });
        }

        renderReport(content);

      } catch (e) {
        document.getElementById('report-body').innerHTML =
          `<div class="empty">Failed to load report: ${e.message}${!getToken() ? ' (sign in first)' : ''}</div>`;
      }
    }

    // Split markdown into sections by headings and major blocks
    function splitIntoSections(content) {
      const lines = content.split('\n');
      const sections = [];
      let current = { startLine: 1, lines: [] };

      lines.forEach((line, idx) => {
        // Start new section on headings or horizontal rules
        if ((line.match(/^#{1,3}\s/) || line.match(/^---\s*$/)) && current.lines.length > 0) {
          sections.push(current);
          current = { startLine: idx + 1, lines: [] };
        }
        current.lines.push(line);
      });
      if (current.lines.length > 0) sections.push(current);
      return sections;
    }

    function lineToSection(lineNum) {
      const sections = splitIntoSections(rawLines.join('\n'));
      for (let i = 0; i < sections.length; i++) {
        const s = sections[i];
        const endLine = s.startLine + s.lines.length - 1;
        if (lineNum >= s.startLine && lineNum <= endLine) return i;
      }
      return 0;
    }

    function renderReport(content) {
      const sections = splitIntoSections(content);
      let html = '<div class="report-rendered">';

      sections.forEach((section, idx) => {
        const md = section.lines.join('\n');
        const rendered = marked.parse(md);
        const comments = commentsBySection[idx];
        const hasComments = comments && comments.length > 0;

        html += `<div class="report-section${hasComments ? ' has-comments' : ''}" data-section="${idx}" data-start-line="${section.startLine}">`;
        html += `<button class="comment-btn" onclick="event.stopPropagation();toggleComment(${idx}, ${section.startLine})" title="Add feedback">+</button>`;
        html += rendered;

        if (hasComments) {
          html += `<div style="margin-top:8px">`;
          comments.forEach(c => {
            html += `
              <div class="existing-comment">
                <div class="comment-author">
                  <img src="${c.user.avatar_url}" alt="${c.user.login}">
                  <strong>${c.user.login}</strong>
                  <time>${new Date(c.created_at).toLocaleDateString()}</time>
                </div>
                <div class="comment-body">${marked.parse(c.body)}</div>
              </div>`;
          });
          html += `</div>`;
        }

        html += `<div id="comment-box-${idx}" style="display:none"></div>`;
        html += `</div>`;
      });

      html += '</div>';
      document.getElementById('report-body').innerHTML = html;
    }

    function toggleComment(sectionIdx, startLine) {
      const box = document.getElementById(`comment-box-${sectionIdx}`);
      if (box.style.display !== 'none') {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }

      if (!getToken()) { alert('Sign in to comment'); return; }
      if (!currentPR) { alert('No PR found for this report'); return; }

      box.style.display = 'block';
      box.innerHTML = `
        <div class="comment-box">
          <textarea id="comment-text-${sectionIdx}" placeholder="Your feedback on this section..."></textarea>
          <div class="actions">
            <button class="btn" onclick="toggleComment(${sectionIdx}, ${startLine})">Cancel</button>
            <button class="btn btn-primary" onclick="postComment(${sectionIdx}, ${startLine})">Submit Feedback</button>
          </div>
        </div>`;
      document.getElementById(`comment-text-${sectionIdx}`).focus();
    }

    async function postComment(sectionIdx, startLine) {
      const text = document.getElementById(`comment-text-${sectionIdx}`).value.trim();
      if (!text) return;

      const btn = event.target;
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      try {
        await submitComment(currentPR.number, currentPath, startLine, text);
        location.reload();
      } catch (e) {
        alert(`Failed to submit: ${e.message}`);
        btn.textContent = 'Submit Feedback';
        btn.disabled = false;
      }
    }

    // Init
    showUser();
    loadReport();
  </script>
</body>
</html>
